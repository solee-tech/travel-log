<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="差旅日志">
  <title>差旅日志</title>
  <!-- 引入 html2pdf.js 用于纯前端生成无杂质的 PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #fff;
      --soft: #f8faf9;
      --text: #17211d;
      --muted: #66736e;
      --line: #dfe5e2;
      --accent: #126c62;
      --accent-dark: #0b5149;
      --danger: #ad3b2e;
      --shadow: 0 18px 45px rgba(23, 33, 29, .08);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eef3f1 0, #f4f6f8 280px), var(--bg);
      color: var(--text);
      font-size: 22px; 
    }

    button, input, textarea { font: inherit; }
    button { border: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }

    .app {
      min-height: 100vh;
      padding: max(18px, env(safe-area-inset-top)) 14px max(22px, env(safe-area-inset-bottom));
    }

    .shell { width: min(100%, 920px); margin: 0 auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
      padding: 6px 2px 0;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 21px; 
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 { margin: 0; font-size: 40px; line-height: 1.08; letter-spacing: 0; } 

    .status {
      min-width: 95px;
      min-height: 36px;
      padding: 6px 14px;
      border: 1px solid rgba(18, 108, 98, .2);
      border-radius: 999px;
      background: rgba(255, 255, 255, .7);
      color: var(--accent-dark);
      font-size: 21px; 
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .panel + .panel { margin-top: 14px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    h2 { margin: 0; color: #26352f; font-size: 26px; line-height: 1.25; letter-spacing: 0; } 

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 13px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 22px; 
      font-weight: 650;
    }

    input, textarea {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      background: var(--soft);
      color: var(--text);
      font-size: 21px; 
      outline: none;
      -webkit-appearance: none;
    }

    textarea { min-height: 140px; resize: vertical; line-height: 1.5; }

    input:focus, textarea:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(18, 108, 98, .16);
    }

    .btn {
      min-height: 52px;
      border-radius: 8px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
      background: var(--accent);
      font-weight: 800;
      font-size: 21px; 
      white-space: nowrap;
    }

    .btn.secondary { color: #26352f; background: #eef3f1; border: 1px solid var(--line); }
    .btn.danger { background: var(--danger); }
    .btn.icon { width: 52px; flex: 0 0 52px; padding: 0; font-size: 27px; } 

    .photo-input { display: none; }
    .photo-list { display: grid; gap: 12px; margin-top: 12px; }

    .photo-card {
      display: grid;
      gap: 11px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .photo-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #e8eeeb;
    }

    .photo-actions { display: flex; justify-content: space-between; gap: 10px; }

    .empty {
      min-height: 110px;
      display: grid;
      place-items: center;
      border: 1px dashed #b9c5c0;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      padding: 18px;
      background: var(--soft);
      line-height: 1.5;
      font-size: 22px; 
    }

    .print-tip {
      background: #eef5f4;
      border-left: 5px solid var(--accent);
      padding: 16px;
      border-radius: 6px;
      font-size: 21px; 
      line-height: 1.55;
      color: #1e3b37;
      margin: 16px 0 6px;
    }

    .print-tip strong {
      color: var(--accent-dark);
    }

    .toolbar {
      position: sticky;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
      padding: 12px 0 0;
      background: linear-gradient(to top, var(--bg) 78%, rgba(244, 246, 248, 0));
      z-index: 2;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(23, 33, 29, 0.45);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      width: min(90%, 450px);
      padding: 24px;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.15);
      transform: scale(0.9);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.active .modal-box {
      transform: scale(1);
    }
    .modal-title {
      margin: 0 0 12px;
      font-size: 25px; 
      font-weight: 800;
      color: #ad3b2e;
    }
    .modal-text {
      font-size: 21px; 
      color: #26352f;
      line-height: 1.55;
      margin-bottom: 24px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    @media (min-width: 740px) {
      .app { padding-left: 24px; padding-right: 24px; }
      .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    /* ================= 打印与 PDF 导出专属 ================= */
    @media print {
      @page { size: A4; margin: 0; }
      @page :first { margin: 0; }
      @page :left  { margin: 0; }
      @page :right { margin: 0; }
      * { box-shadow: none !important; }
      html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .app { display: none !important; }
      .report { display: block !important; }
    }

    body.pdf-exporting { background: #fff !important; margin: 0 !important; padding: 0 !important; }
    body.pdf-exporting .app { display: none !important; }
    body.pdf-exporting .report { display: block !important; }

    .report {
      display: none;
      color: #141a17;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }

    /* 严格控制页面高度，避免 1 像素溢出导致的白页 */
    .print-page {
      width: 210mm;
      height: 295.5mm; /* 稍微缩小一点，给A4纸(297mm)留出绝对安全边距 */
      padding: 16mm 18mm;
      background: #fff;
      box-sizing: border-box;
      page-break-after: always;
      break-after: page;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .print-page:last-of-type {
      page-break-after: avoid;
      break-after: avoid;
    }

    .report-cover {
      border-bottom: 3px solid #123f39;
      padding-bottom: 5mm;
      margin-bottom: 5mm;
      flex-shrink: 0;
    }

    .report-kicker {
      margin: 0 0 2mm;
      color: #126c62;
      font-size: 12pt; 
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .report h1 {
      margin: 0;
      font-size: 30pt; 
      line-height: 1.15;
    }

    .report h2 {
      margin: 0 0 3mm;
      color: #123f39;
      font-size: 17pt; 
      line-height: 1.3;
      flex-shrink: 0;
    }

    .report-section {
      margin-bottom: 5mm;
      flex-shrink: 0;
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .report-table th,
    .report-table td {
      border: 1px solid #b9c2bf;
      padding: 8pt 10pt;
      vertical-align: top;
      text-align: left;
      font-size: 13pt; 
      line-height: 1.45;
      word-break: break-word;
    }

    .report-table th {
      width: 24%;
      background: #eef3f1;
      color: #26352f;
      font-weight: 800;
    }

    .report-notes {
      border: 1px solid #b9c2bf;
      padding: 10pt;
      min-height: 45pt;
      white-space: pre-wrap;
      font-size: 13pt; 
      line-height: 1.55;
    }

    .photo-page {
      display: flex;
      flex-direction: column;
    }

    .photo-page-grid {
      display: flex;
      flex-direction: column;
      gap: 5mm;
      flex: 1;
      min-height: 0;
    }

    .report-photo {
      border: 1px solid #b9c2bf;
      padding: 8pt 10pt;
      margin: 0;
      box-sizing: border-box;
      background: #fff;
      display: flex;
      flex-direction: column;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .photo-page .report-photo {
      flex: 1;
      min-height: 0;
    }

    .report-photo img {
      display: block;
      width: 100%;
      flex: 1;
      min-height: 0;
      object-fit: contain;
      margin: 0 auto;
    }

    .first-page-photo {
      flex-shrink: 0;
    }
    .first-page-photo img {
      flex: none;
      max-height: 75mm;
      width: auto;
      max-width: 100%;
    }

    .report-photo p {
      margin: 6pt 0 0;
      white-space: pre-wrap;
      font-size: 12.5pt; 
      line-height: 1.41;
      color: #26352f;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Business Travel Log</p>
          <h1>差旅日志</h1>
        </div>
        <div class="status" id="status">已准备</div>
      </header>

      <section class="panel" aria-label="差旅基本信息">
        <div class="section-title">
          <h2>基本信息</h2>
          <button class="btn secondary icon" id="fillNow" type="button" aria-label="填入当前时间" title="填入当前时间">↺</button>
        </div>

        <div class="grid two">
          <label>日期时间<input id="dateTime" type="datetime-local"></label>
          <label>差旅人员<input id="traveler" type="text" placeholder="例如：王明"></label>
          <label>地点<input id="place" type="text" placeholder="例如：上海市浦东新区"></label>
          <label>公司名称<input id="company" type="text" placeholder="例如：某某科技有限公司"></label>
          <label>对接人员<input id="contactPerson" type="text" placeholder="例如：张先生、李女士"></label>
        </div>

        <label style="margin-top: 13px;">差旅记录<textarea id="notes" placeholder="记录拜访目的、沟通内容、关键结论、后续事项等"></textarea></label>
      </section>

      <section class="panel" aria-label="照片与注释">
        <div class="section-title">
          <h2>照片与注释</h2>
          <button class="btn secondary" id="addPhoto" type="button">＋ 添加照片</button>
          <input class="photo-input" id="photoInput" type="file" accept="image/*" multiple>
        </div>
        <div id="photoList" class="photo-list"></div>
      </section>

      <div class="toolbar" aria-label="操作">
        <button class="btn secondary" id="saveDraft" type="button">保存草稿</button>
        <button class="btn secondary" id="loadDraft" type="button">读取草稿</button>
        <button class="btn danger" id="clearAll" type="button">清空</button>
        <button class="btn" id="exportPdf" type="button">导出 PDF</button>
      </div>
    </div>
  </main>

  <div id="confirmModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">⚠ 确认清空</div>
      <div class="modal-text">确定要清空当前的全部内容吗？此操作将抹去所有输入的文本和已上传的照片，且无法恢复。</div>
      <div class="modal-actions">
        <button class="btn secondary" id="modalCancel" type="button">取消</button>
        <button class="btn danger" id="modalConfirm" type="button">确定清空</button>
      </div>
    </div>
  </div>

  <article class="report" id="report" aria-label="差旅日志 PDF"></article>

  <script>
    const fields = {
      dateTime: document.getElementById('dateTime'),
      traveler: document.getElementById('traveler'),
      place: document.getElementById('place'),
      company: document.getElementById('company'),
      contactPerson: document.getElementById('contactPerson'),
      notes: document.getElementById('notes')
    };

    const statusEl = document.getElementById('status');
    const photoInput = document.getElementById('photoInput');
    const photoList = document.getElementById('photoList');
    const report = document.getElementById('report');

    const confirmModal = document.getElementById('confirmModal');
    const modalCancel = document.getElementById('modalCancel');
    const modalConfirm = document.getElementById('modalConfirm');
    let confirmCallback = null;

    const draftKey = 'business-travel-log-draft-v3';
    let photos = [];

    function setStatus(text) {
      statusEl.textContent = text;
      window.clearTimeout(setStatus.timer);
      setStatus.timer = window.setTimeout(() => statusEl.textContent = '已准备', 2200);
    }

    function showConfirm(callback) {
      confirmCallback = callback;
      confirmModal.classList.add('active');
    }

    modalCancel.addEventListener('click', () => {
      confirmModal.classList.remove('active');
      confirmCallback = null;
    });

    modalConfirm.addEventListener('click', () => {
      confirmModal.classList.remove('active');
      if (confirmCallback) confirmCallback();
      confirmCallback = null;
    });

    function pad(value) { return String(value).padStart(2, '0'); }

    function currentDateTimeValue() {
      const now = new Date();
      return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    }

    function formatDateTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value.replace('T', ' ');
      return new Intl.DateTimeFormat('zh-CN', {
        year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
      }).format(date);
    }

    function fileDate(value) {
      return value ? value.slice(0, 10) : '';
    }

    function cleanFilePart(value) {
      return String(value || '').trim().replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '');
    }

    function pdfFileName() {
      const date = cleanFilePart(fileDate(fields.dateTime.value));
      const company = cleanFilePart(fields.company.value);
      return [date, company, '差旅日志'].filter(Boolean).join('-') || '差旅日志';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function loadImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = dataUrl;
      });
    }

    async function compressImage(dataUrl) {
      const image = await loadImage(dataUrl);
      const maxSide = 1400;
      const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
      const width = Math.max(1, Math.round(image.width * scale));
      const height = Math.max(1, Math.round(image.height * scale));
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      canvas.width = width;
      canvas.height = height;
      context.drawImage(image, 0, 0, width, height);
      return canvas.toDataURL('image/jpeg', 0.84);
    }

    function readImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            resolve({
              id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
              name: file.name,
              dataUrl: await compressImage(reader.result),
              caption: ''
            });
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function renderPhotos() {
      if (!photos.length) {
        photoList.innerHTML = '<div class="empty">还没有照片。可从相册选择，也可直接拍照后添加。</div>';
        return;
      }

      photoList.innerHTML = photos.map((photo, index) => `
        <div class="photo-card" data-id="${photo.id}">
          <img src="${photo.dataUrl}" alt="差旅照片 ${index + 1}">
          <label>照片 ${index + 1} 注释<textarea data-caption="${photo.id}" placeholder="为这张照片添加说明">${escapeHtml(photo.caption)}</textarea></label>
          <div class="photo-actions">
            <button class="btn secondary" type="button" data-move-up="${photo.id}">上移</button>
            <button class="btn danger" type="button" data-remove="${photo.id}">删除</button>
          </div>
        </div>
      `).join('');
    }

    function getFormData() {
      return {
        dateTime: fields.dateTime.value,
        traveler: fields.traveler.value.trim(),
        place: fields.place.value.trim(),
        company: fields.company.value.trim(),
        contactPerson: fields.contactPerson.value.trim(),
        notes: fields.notes.value.trim(),
        photos
      };
    }

    function applyFormData(data) {
      fields.dateTime.value = data.dateTime || '';
      fields.traveler.value = data.traveler || '';
      fields.place.value = data.place || '';
      fields.company.value = data.company || '';
      fields.contactPerson.value = data.contactPerson || data.people || '';
      fields.notes.value = data.notes || '';
      photos = Array.isArray(data.photos) ? data.photos : [];
      renderPhotos();
    }

    function saveDraft() {
      try {
        localStorage.setItem(draftKey, JSON.stringify(getFormData()));
        setStatus('草稿已保存');
      } catch {
        setStatus('照片较多，草稿保存失败');
      }
    }

    function loadDraft() {
      const raw = localStorage.getItem(draftKey)
        || localStorage.getItem('business-travel-log-draft-v2')
        || localStorage.getItem('business-trip-log-draft-v1');
      if (!raw) {
        setStatus('没有草稿');
        return;
      }
      try {
        applyFormData(JSON.parse(raw));
        setStatus('草稿已读取');
      } catch {
        setStatus('草稿无法读取');
      }
    }

    function buildReport() {
      const data = getFormData();
      let reportHtml = '';

      reportHtml += `
        <div class="print-page">
          <section class="report-cover">
            <p class="report-kicker">Business Travel Log</p>
            <h1>差旅日志</h1>
          </section>
          <section class="report-section">
            <h2>基本信息</h2>
            <table class="report-table">
              <tr><th>日期时间</th><td>${escapeHtml(formatDateTime(data.dateTime))}</td></tr>
              <tr><th>差旅人员</th><td>${escapeHtml(data.traveler)}</td></tr>
              <tr><th>地点</th><td>${escapeHtml(data.place)}</td></tr>
              <tr><th>公司名称</th><td>${escapeHtml(data.company)}</td></tr>
              <tr><th>对接人员</th><td>${escapeHtml(data.contactPerson)}</td></tr>
            </table>
          </section>
          <section class="report-section">
            <h2>差旅记录</h2>
            <div class="report-notes">${escapeHtml(data.notes)}</div>
          </section>
      `;

      if (data.photos.length > 0) {
        reportHtml += `
          <section class="report-section" style="margin-top: auto; margin-bottom: 0; flex-shrink: 0;">
            <h2>照片与注释</h2>
            <div class="report-photo first-page-photo">
              <img src="${data.photos[0].dataUrl}" alt="差旅照片 1">
              <p><strong>照片 1：</strong>${escapeHtml(data.photos[0].caption || '')}</p>
            </div>
          </section>
        `;
      }
      reportHtml += `</div>`;

      for (let i = 1; i < data.photos.length; i += 2) {
        reportHtml += `
          <div class="print-page photo-page">
            <h2 style="flex-shrink:0; margin-bottom:4mm;">照片与注释（续）</h2>
            <div class="photo-page-grid">
              <div class="report-photo">
                <img src="${data.photos[i].dataUrl}" alt="差旅照片 ${i + 1}">
                <p><strong>照片 ${i + 1}：</strong>${escapeHtml(data.photos[i].caption || '')}</p>
              </div>
        `;

        if (i + 1 < data.photos.length) {
          reportHtml += `
              <div class="report-photo">
                <img src="${data.photos[i + 1].dataUrl}" alt="差旅照片 ${i + 2}">
                <p><strong>照片 ${i + 2}：</strong>${escapeHtml(data.photos[i + 1].caption || '')}</p>
              </div>
          `;
        }

        reportHtml += `
            </div>
          </div>
        `;
      }

      report.innerHTML = reportHtml;
    }

    document.getElementById('fillNow').addEventListener('click', () => {
      fields.dateTime.value = currentDateTimeValue();
      setStatus('已填入当前时间');
    });

    document.getElementById('addPhoto').addEventListener('click', () => photoInput.click());

    photoInput.addEventListener('change', async (event) => {
      const files = Array.from(event.target.files || []);
      if (!files.length) return;
      setStatus('正在处理照片');
      try {
        const images = await Promise.all(files.map(readImage));
        photos = photos.concat(images);
        photoInput.value = '';
        renderPhotos();
        setStatus(`已添加 ${images.length} 张照片`);
      } catch {
        setStatus('照片添加失败');
      }
    });

    photoList.addEventListener('input', (event) => {
      const id = event.target.dataset.caption;
      if (!id) return;
      const photo = photos.find(item => item.id === id);
      if (photo) photo.caption = event.target.value;
    });

    photoList.addEventListener('click', (event) => {
      const removeId = event.target.dataset.remove;
      const moveId = event.target.dataset.moveUp;

      if (removeId) {
        photos = photos.filter(photo => photo.id !== removeId);
        renderPhotos();
        setStatus('照片已删除');
      }

      if (moveId) {
        const index = photos.findIndex(photo => photo.id === moveId);
        if (index > 0) {
          [photos[index - 1], photos[index]] = [photos[index], photos[index - 1]];
          renderPhotos();
          setStatus('照片已上移');
        }
      }
    });

    document.getElementById('saveDraft').addEventListener('click', saveDraft);
    document.getElementById('loadDraft').addEventListener('click', loadDraft);

    document.getElementById('clearAll').addEventListener('click', () => {
      showConfirm(() => {
        applyFormData({});
        localStorage.removeItem(draftKey);
        setStatus('已清空');
      });
    });

    // 修复：生成多个前置和后置空白页的问题
    document.getElementById('exportPdf').addEventListener('click', () => {
      const defaultName = pdfFileName();
      let finalName = prompt("请确认或修改PDF文件名：\n（注：生成高清PDF约需几秒钟，请耐心等待完成提示）", defaultName);
      if (finalName === null) return; 
      if (finalName.trim() === '') finalName = defaultName;

      buildReport();
      saveDraft();

      if (typeof html2pdf !== 'undefined') {
        setStatus('正在生成PDF，请稍候...');
        
        // 关键修复 1：重置滚动条。因为导出按钮在最底部，如果页面有滚动，html2canvas 会把滚动过的距离全渲染成顶部的空白页。
        window.scrollTo(0, 0);
        
        document.body.classList.add('pdf-exporting');
        const element = document.getElementById('report');
        
        const opt = {
          margin:       0,
          filename:     `${finalName}.pdf`,
          image:        { type: 'jpeg', quality: 0.96 },
          // 关键修复 2：强制设定 scrollY 和 scrollX 为 0，杜绝偏移量造成的空白。
          html2canvas:  { scale: 2, useCORS: true, logging: false, scrollY: 0, scrollX: 0 },
          jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak:    { mode: ['css'] } 
        };

        // 给 DOM 一点点时间应用 classList，确保高度坍塌完成再抓取
        setTimeout(() => {
          html2pdf().set(opt).from(element).save().then(() => {
            document.body.classList.remove('pdf-exporting');
            setStatus('PDF导出成功');
          }).catch(err => {
            console.error(err);
            document.body.classList.remove('pdf-exporting');
            setStatus('导出错误，回退到普通打印');
            document.title = finalName;
            window.print();
            setTimeout(() => { document.title = '差旅日志'; }, 1000);
          });
        }, 100);
      } else {
        document.title = finalName;
        window.print();
        setTimeout(() => { document.title = '差旅日志'; }, 1000);
      }
    });

    fields.dateTime.value = currentDateTimeValue();
    renderPhotos();
  </script>
</body>
</html>
